name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  structure-check:
    name: Repository structure check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          set -e
          test -f README.md
          test -f docker-compose.yml
          test -f apps/api/pyproject.toml
          test -f apps/api/app/main.py
          test -f apps/api/alembic.ini
          test -f apps/web/package.json
          test -f docs/DEPLOYMENT_GUIDELINES.md
          test -f docs/OPERATIONS_RUNBOOK.md
          test -f docs/PRODUCTION_READINESS_CHECKLIST.md
          echo "Required foundation files present."

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config --quiet

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check app tests alembic

      - name: Mypy
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest tests/ -v

  migration-check:
    name: Alembic migration check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: internal_sea_core
          POSTGRES_USER: internal_sea
          POSTGRES_PASSWORD: internal_sea
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U internal_sea -d internal_sea_core"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://internal_sea:internal_sea@localhost:5432/internal_sea_core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Verify migration state
        run: uv run alembic current

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
