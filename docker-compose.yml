services:
  postgres:
    image: postgres:16
    container_name: internal-sea-core-postgres
    environment:
      POSTGRES_DB: internal_sea_core
      POSTGRES_USER: internal_sea
      POSTGRES_PASSWORD: internal_sea
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U internal_sea -d internal_sea_core"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: internal-sea-core-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    container_name: internal-sea-core-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    volumes:
      - ./apps/api/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      target: dev
    container_name: internal-sea-core-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0

  worker:
    build: ./apps/api
    container_name: internal-sea-core-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/app:/app/app
    command: python -m app.worker.main run-loop
    profiles:
      - worker

volumes:
  postgres_data:
