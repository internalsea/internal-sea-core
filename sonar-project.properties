# SonarCloud configuration for Internal Sea
# Replace placeholders after creating the project in SonarCloud:
#   https://sonarcloud.io/projects/create
sonar.projectKey=your-organization_internal-sea-core
sonar.organization=your-organization

sonar.projectName=Internal Sea
sonar.projectVersion=0.1.0

# Monorepo source roots (Python: apps/api, packages/* — JS/TS: apps/web)
sonar.sources=apps,packages
sonar.tests=apps,packages

sonar.python.version=3.11
sonar.javascript.node.maxspace=4096

# Coverage reports (populated by CI once tests exist)
sonar.python.coverage.reportPaths=apps/api/coverage.xml
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

sonar.test.inclusions=**/test_*.py,**/*_test.py,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/*.pyc,**/.venv/**,**/venv/**,**/dist/**,**/build/**,**/.git/**,**/.gitkeep

# Quality gate: enforced on main pushes via CI/CD workflow (see .github/workflows/ci.yml)
sonar.qualitygate.wait=true

sonar.sourceEncoding=UTF-8
