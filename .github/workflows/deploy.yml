# Combined CI/CD pipeline: checks, on-prem deploy, and post-deploy smoke tests.
#
# Deploy secrets (same as shared-landing):
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
# Optional: DEPLOY_PORT, DEPLOY_BASE_DIR, DEPLOY_BRANCH, DEPLOY_GIT_TOKEN, REPO_*,
#           SMOKE_BASE_URL (default https://intsea.dev)

name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  structure-check:
    name: Repository structure check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          set -e
          test -f README.md
          test -f docker-compose.yml
          test -f .env.example
          test -f apps/api/pyproject.toml
          test -f apps/api/app/main.py
          test -f apps/api/alembic.ini
          test -f apps/web/package.json
          test -f docs/DEPLOYMENT_GUIDELINES.md
          test -f docs/OPERATIONS_RUNBOOK.md
          test -f docs/PRODUCTION_READINESS_CHECKLIST.md
          echo "Required foundation files present."

      - name: Validate docker-compose syntax
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config --quiet

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check app tests alembic

      - name: Mypy
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest tests/ -v

  migration-check:
    name: Alembic migration check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: internal_sea_core
          POSTGRES_USER: internal_sea
          POSTGRES_PASSWORD: internal_sea
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U internal_sea -d internal_sea_core"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://internal_sea:internal_sea@localhost:5432/internal_sea_core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Verify migration state
        run: uv run alembic current

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          VITE_API_BASE_URL: /api/v1
        run: pnpm build

      - name: Verify production API base URL in bundle
        run: |
          set -euo pipefail
          if ! grep -rq '/api/v1' dist/assets/*.js; then
            echo "::error::Production bundle missing /api/v1 API base URL"
            exit 1
          fi
          if grep -rq 'http://localhost:8000/api/v1' dist/assets/*.js; then
            echo "::error::Production bundle still references localhost API URL"
            exit 1
          fi

  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - structure-check
      - backend
      - migration-check
      - frontend
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    concurrency:
      group: onprem-deploy
      cancel-in-progress: false
    env:
      SSH_HOST: ${{ secrets.DEPLOY_HOST }}
      SSH_USER: ${{ secrets.DEPLOY_USER }}
      SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      SSH_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_BASE_DIR: ${{ secrets.DEPLOY_BASE_DIR }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
      DEPLOY_GIT_TOKEN: ${{ secrets.DEPLOY_GIT_TOKEN }}
      COMPOSE_SERVICES: intsea-postgres intsea-redis intsea-backend intsea-frontend
      # Rebuild Internal Sea images after update-repo so one-off migrate/seed containers use current code.
      COMPOSE_BUILD: "1"
      COMPOSE_BUILD_SERVICES: intsea-backend intsea-frontend
      REPO_SHARED_LANDING: ${{ secrets.REPO_SHARED_LANDING }}
      REPO_CITY_GODS_TODAY: ${{ secrets.REPO_CITY_GODS_TODAY }}
      REPO_DEVS_FASHION: ${{ secrets.REPO_DEVS_FASHION }}
      REPO_DEVS_FASHION_BACKEND: ${{ secrets.REPO_DEVS_FASHION_BACKEND }}
      REPO_INTERNAL_SEA_COM: ${{ secrets.REPO_INTERNAL_SEA_COM }}
      REPO_INTERNAL_SEA_HOLDING_COM: ${{ secrets.REPO_INTERNAL_SEA_HOLDING_COM }}
      REPO_INTERNAL_SEA_CORE: ${{ secrets.REPO_INTERNAL_SEA_CORE }}

    steps:
      - name: Check required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            eval "val=\${$name:-}"
            if [ -z "$val" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout shared-landing deploy scripts
        uses: actions/checkout@v4
        with:
          repository: muove4sea/shared-landing
          ref: main
          path: shared-landing
          token: ${{ secrets.DEPLOY_GIT_TOKEN }}

      - name: Update shared-landing
        run: bash shared-landing/scripts/ci-ssh-remote.sh update-repo shared-landing

      - name: Update internal-sea-core
        run: bash shared-landing/scripts/ci-ssh-remote.sh update-repo internal-sea-core

      - name: Sync compose environment
        run: bash shared-landing/scripts/ci-ssh-remote.sh sync-env

      - name: Verify Docker build context
        run: bash shared-landing/scripts/ci-ssh-remote.sh verify-repo internal-sea-core

      - name: Build Internal Sea images on server
        run: bash shared-landing/scripts/ci-ssh-remote.sh compose-build intsea-backend intsea-frontend

      - name: Docker Compose up
        run: bash shared-landing/scripts/ci-ssh-remote.sh compose-up

  smoke-check:
    name: Health check and access test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: deploy
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install smoke check tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dnsutils openssl curl

      - name: Allow services to become reachable
        run: |
          echo "Waiting 90s after deploy before smoke checks"
          sleep 90

      - name: HTTPS accessibility and health
        run: bash scripts/post-deploy-smoke.sh
